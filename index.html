<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Productivity Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>📚 Student Productivity Dashboard</h1>
<p>Organize your study tasks efficiently</p>

<button class="mode-toggle" onclick="toggleMode()">🌙 Toggle Mode</button>

</header>


<div class="container">

<div class="task-input">

<input id="taskInput" type="text" placeholder="Enter new task...">

<select id="category">
<option value="Study">Study</option>
<option value="Assignment">Assignment</option>
<option value="Exam">Exam</option>
<option value="Personal">Personal</option>
</select>

<select id="priority">
<option value="Low">Low Priority</option>
<option value="Medium">Medium Priority</option>
<option value="High">High Priority</option>
</select>

<input type="date" id="deadline">

<button onclick="addTask()">Add Task</button>

</div>


<input id="searchTask" type="text" placeholder="🔍 Search tasks..." onkeyup="renderTasks()">


<div class="stats">

<div class="stat">
<h3 id="totalTasks">0</h3>
<p>Total Tasks</p>
</div>

<div class="stat">
<h3 id="completedTasks">0</h3>
<p>Completed</p>
</div>

</div>


<div class="progress-bar">
<div id="progress"></div>
</div>


<h2>Pending Tasks</h2>
<ul id="taskList"></ul>


<h2>Completed Tasks</h2>
<ul id="completedList"></ul>


</div>


<footer>
<p>Student Task Dashboard • Web Development Project</p>
</footer>


<script src="script.js"></script>

</body>
</html>
