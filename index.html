<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EasyTask</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LANDING PAGE -->

<section class="landing" id="landing">

<h1>EasyTask</h1>

<p>Smart Task Management For Students</p>

<button onclick="openApp()">Start Organizing</button>

</section>



<!-- DASHBOARD -->

<section class="app" id="app">

<header>

<h2>EasyTask Dashboard</h2>

</header>


<div class="stats">

<div class="card">
<h3 id="totalTasks">0</h3>
<p>Total Tasks</p>
</div>

<div class="card">
<h3 id="completedTasks">0</h3>
<p>Completed</p>
</div>

<div class="card">
<h3 id="pendingTasks">0</h3>
<p>Pending</p>
</div>

</div>



<div class="task-form">

<input id="taskInput" placeholder="Enter a task">

<input type="date" id="dueDate">

<select id="category">

<option>School</option>
<option>Work</option>
<option>Personal</option>

</select>

<button onclick="addTask()">Add</button>

</div>



<ul id="taskList"></ul>

</section>

<script src="app.js"></script>

</body>

  </html>
